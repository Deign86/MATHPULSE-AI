models:
  primary:
    id: Qwen/QwQ-32B
    description: Default free-tier generation model — chat, lightweight tasks, all fallbacks
    max_new_tokens: 800
    temperature: 0.7
    top_p: 0.9

  rag_primary:
    id: Qwen/Qwen3-235B-A22B
    description: HF Pro RAG generation model — lesson and problem generation with extended reasoning
    max_new_tokens: 1800
    temperature: 0.2
    top_p: 0.9
    enable_thinking_tasks:
      - rag_lesson
    no_thinking_tasks:
      - rag_problem
      - rag_analysis_context

  embedding:
    id: BAAI/bge-small-en-v1.5
    description: Embedding model for RAG retrieval — curriculum vectorstore ingestion and semantic search
    note: Not part of the generation pipeline. Read from EMBEDDING_MODEL env var only. Not swappable via admin panel.

model_capabilities:
  sequential_only:
    - Qwen/Qwen3-235B-A22B
    - Qwen/Qwen3-235B-A22B-FP8
    - Qwen/Qwen3-235B-A22B-Instruct-2507
    - Qwen/Qwen3-235B-A22B-Thinking-2507
  supports_thinking:
