<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"></script><style>.podium { position: relative; width: 140px; height: 180px; margin: 100px; }
.front { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #7e22ce, #4c1d95); border-radius: 6px; z-index: 3; }
.top { position: absolute; top: -30px; left: 15px; width: 100%; height: 30px; background: linear-gradient(to right, #9333ea, #a855f7); transform: skewX(-45deg); transform-origin: bottom left; border-radius: 6px 6px 0 0; z-index: 2;}
.side { position: absolute; top: -15px; left: -30px; width: 30px; height: 100%; background: linear-gradient(to bottom, #6b21a8, #3b0764); transform: skewY(-45deg); transform-origin: top right; border-radius: 6px 0 0 6px; z-index: 1;}
</style></head><body><div class="podium"><div class="side"></div><div class="top"></div><div class="front"></div></div></body></html>
