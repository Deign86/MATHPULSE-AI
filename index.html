
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <link rel="icon" type="image/png" href="/avatar/avatar_icon.png" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
      <style>
        #boot-shell {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          align-items: center;
          justify-content: center;
          background: linear-gradient(140deg, #f8fbff 0%, #eef4ff 55%, #fff5dc 100%);
          font-family: 'Nunito', ui-sans-serif, system-ui, sans-serif;
          color: #0a1628;
        }

        #boot-shell-card {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          padding: 0.95rem 1.15rem;
          border-radius: 999px;
          border: 1px solid rgba(143, 166, 205, 0.3);
          background: rgba(255, 255, 255, 0.84);
          box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        }

        #boot-shell-spinner {
          width: 0.9rem;
          height: 0.9rem;
          border-radius: 999px;
          border: 2px solid rgba(88, 119, 177, 0.25);
          border-top-color: #5877b1;
          animation: boot-spin 0.8s linear infinite;
        }

        #boot-shell-label {
          font-size: 0.9rem;
          font-weight: 700;
          letter-spacing: 0.01em;
        }

        @keyframes boot-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
      <title>MathPulse AI</title>
    </head>

    <body>
      <div id="boot-shell" aria-live="polite" aria-busy="true">
        <div id="boot-shell-card">
          <div id="boot-shell-spinner" aria-hidden="true"></div>
          <span id="boot-shell-label">Starting MathPulse AI...</span>
        </div>
      </div>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
