http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ai_endpoints:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=auth_endpoints:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=quiz_endpoints:10m rate=30r/m;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
        gzip_min_length 256;

        # Never cache index.html — it references hashed assets that change between deploys
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        # SPA fallback - serve index.html for all client-side routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the FastAPI backend
        location /api/ {
            # Apply global rate limit first
            limit_req zone=global burst=20 nodelay;
            
            # Route-specific rate limits
            location ~ ^/api/ai/ {
                limit_req zone=ai_endpoints burst=5 nodelay;
                proxy_pass http://backend:8000/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
            
            location ~ ^/api/auth/ {
                limit_req zone=auth_endpoints burst=2 nodelay;
                proxy_pass http://backend:8000/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
            
            location ~ ^/api/quiz/ {
                limit_req zone=quiz_endpoints burst=10;
                proxy_pass http://backend:8000/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
            
            # Default proxy for other /api/ routes
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cache static assets
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Custom error page for rate limiting
        error_page 429 = @rate_limit_exceeded;
        
        location @rate_limit_exceeded {
            default_type application/json;
            return 429 '{"error": "rate_limit_exceeded", "message": "Too many requests. Please try again later."}';
        }
    }
}
