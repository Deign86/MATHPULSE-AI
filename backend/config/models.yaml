models:
  primary:
    id: Qwen/Qwen2.5-Math-72B-Instruct
    description: Math-specialized Grade 11-12 tutor model (enhanced accuracy)
    max_new_tokens: 1024
    temperature: 0.3
    top_p: 0.85

  backup:
    - id: meta-llama/Llama-3.1-8B-Instruct
      description: Lower-cost backup model for high traffic
      max_new_tokens: 384
      temperature: 0.2
      top_p: 0.9
    - id: google/gemma-2-2b-it
      description: Secondary backup with broad instruction coverage
      max_new_tokens: 384
      temperature: 0.2
      top_p: 0.9

  experimental:
    - id: mistralai/Mistral-7B-Instruct-v0.3
      notes: Prompt/procedure experimentation
    - id: meta-llama/Meta-Llama-3-8B-Instruct
      notes: Baseline comparison against legacy deployment

routing:
  task_model_map:
    # Primary: Qwen2.5-Math-72B for chat (math-optimized, better accuracy for Grade 11-12)
    # Fallback chain: Qwen2.5-Math-7B-Instruct → Llama-3.1-8B-Instruct
    chat: Qwen/Qwen2.5-Math-72B-Instruct
    verify_solution: Qwen/Qwen2.5-Math-7B-Instruct
    lesson_generation: Qwen/Qwen2.5-7B-Instruct
    quiz_generation: Qwen/Qwen2.5-7B-Instruct
    learning_path: Qwen/Qwen2.5-7B-Instruct
    daily_insight: Qwen/Qwen2.5-7B-Instruct
    risk_classification: Qwen/Qwen2.5-7B-Instruct
    risk_narrative: Qwen/Qwen2.5-7B-Instruct

  task_fallback_model_map:
    chat:
      - Qwen/Qwen2.5-Math-72B-Instruct      # Primary (math-specialized)
      - Qwen/Qwen2.5-Math-7B-Instruct       # First fallback (smaller math model)
      - meta-llama/Llama-3.1-8B-Instruct    # Secondary fallback
      - google/gemma-2-2b-it                # Tertiary fallback
    verify_solution:
      - Qwen/Qwen2.5-Math-7B-Instruct       # Primary fallback (math-optimized)
      - meta-llama/Llama-3.1-8B-Instruct    # Secondary fallback
      - google/gemma-2-2b-it                # Tertiary fallback

  task_provider_map:
    # All tasks use hf_inference router (Qwen2.5-7B-Instruct natively supported)
    chat: hf_inference
    verify_solution: hf_inference
    lesson_generation: hf_inference
    quiz_generation: hf_inference
    learning_path: hf_inference
    daily_insight: hf_inference
    risk_narrative: hf_inference
    risk_classification: hf_inference
