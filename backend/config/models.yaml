models:
  primary:
    id: Qwen/Qwen3.5-9B
    description: Main Grade 11-12 tutor model (router-supported)
    max_new_tokens: 512
    temperature: 0.2
    top_p: 0.9

  backup:
    - id: meta-llama/Llama-3.1-8B-Instruct
      description: Lower-cost backup model for high traffic
      max_new_tokens: 384
      temperature: 0.2
      top_p: 0.9
    - id: google/gemma-2-2b-it
      description: Secondary backup with broad instruction coverage
      max_new_tokens: 384
      temperature: 0.2
      top_p: 0.9

  experimental:
    - id: mistralai/Mistral-7B-Instruct-v0.3
      notes: Prompt/procedure experimentation
    - id: meta-llama/Meta-Llama-3-8B-Instruct
      notes: Baseline comparison against legacy deployment

routing:
  task_model_map:
    # Primary: Qwen/Qwen2.5-Math-7B-Instruct (directly accessible via HF serverless TGI)
    # Fallback chain: meta-llama/Llama-3.1-8B-Instruct (router-compatible)
    chat: Qwen/Qwen2.5-Math-7B-Instruct
    verify_solution: Qwen/Qwen2.5-Math-7B-Instruct
    lesson_generation: Qwen/Qwen2.5-Math-7B-Instruct
    quiz_generation: Qwen/Qwen2.5-Math-7B-Instruct
    learning_path: Qwen/Qwen2.5-Math-7B-Instruct
    daily_insight: Qwen/Qwen2.5-Math-7B-Instruct
    risk_classification: Qwen/Qwen2.5-Math-7B-Instruct
    risk_narrative: Qwen/Qwen2.5-Math-7B-Instruct

  task_fallback_model_map:
    chat:
      - meta-llama/Llama-3.1-8B-Instruct    # Primary fallback (router-compatible)
      - google/gemma-2-2b-it                # Secondary fallback
    verify_solution:
      - meta-llama/Llama-3.1-8B-Instruct    # Primary fallback (router-compatible)
      - google/gemma-2-2b-it                # Secondary fallback

  task_provider_map:
    # Qwen models are only served by featherless-ai provider
    chat: featherless-ai
    verify_solution: featherless-ai
    lesson_generation: local_space
    quiz_generation: local_space
    learning_path: local_space
    daily_insight: featherless-ai
    risk_narrative: featherless-ai
    risk_classification: hf_inference
