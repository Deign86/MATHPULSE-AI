models:
  primary:
    id: Qwen/Qwen3.5-9B
    description: Main Grade 11-12 tutor model (router-supported)
    max_new_tokens: 512
    temperature: 0.2
    top_p: 0.9

  backup:
    - id: meta-llama/Llama-3.1-8B-Instruct
      description: Lower-cost backup model for high traffic
      max_new_tokens: 384
      temperature: 0.2
      top_p: 0.9
    - id: google/gemma-2-2b-it
      description: Secondary backup with broad instruction coverage
      max_new_tokens: 384
      temperature: 0.2
      top_p: 0.9

  experimental:
    - id: mistralai/Mistral-7B-Instruct-v0.3
      notes: Prompt/procedure experimentation
    - id: meta-llama/Meta-Llama-3-8B-Instruct
      notes: Baseline comparison against legacy deployment

routing:
  task_model_map:
    # Primary: Mistral-7B-Instruct-v0.2 (2.7M downloads, proven stable on HF router)
    # Alternative: meta-llama/Llama-3.1-8B-Instruct (confirmed working)
    # Note: Qwen models have compatibility issues with Featherless AI on HF router
    chat: mistralai/Mistral-7B-Instruct-v0.2
    verify_solution: mistralai/Mistral-7B-Instruct-v0.2
    lesson_generation: mistralai/Mistral-7B-Instruct-v0.2
    quiz_generation: mistralai/Mistral-7B-Instruct-v0.2
    learning_path: mistralai/Mistral-7B-Instruct-v0.2
    daily_insight: mistralai/Mistral-7B-Instruct-v0.2
    risk_classification: meta-llama/Llama-3.1-8B-Instruct
    risk_narrative: meta-llama/Llama-3.1-8B-Instruct

  task_fallback_model_map:
    chat:
      - mistralai/Mistral-7B-Instruct-v0.2  # Primary fallback
      - meta-llama/Llama-3.1-8B-Instruct    # Secondary fallback
      - google/gemma-2-2b-it                # Tertiary fallback
    verify_solution:
      - mistralai/Mistral-7B-Instruct-v0.2  # Primary fallback
      - meta-llama/Llama-3.1-8B-Instruct    # Secondary fallback
      - google/gemma-2-2b-it                # Tertiary fallback

  task_provider_map:
    quiz_generation: local_space
    lesson_generation: local_space
    learning_path: local_space
    daily_insight: local_space
    risk_narrative: local_space
    risk_classification: hf_inference
