# ============================================================
# Auto-deploy to Hugging Face Spaces on push to main
# - Backend (Docker): Deign86/mathpulse-api
# - Frontend (Static): Deign86/mathpulse-ai
# ============================================================
# 
# SETUP (one-time):
# 1. Go to https://huggingface.co/settings/tokens
#    Create a token with "Write" access
# 2. In your GitHub repo, go to Settings → Secrets → Actions
#    Add these secrets:
#      HF_TOKEN                         — HuggingFace write token
#      VITE_FIREBASE_API_KEY            — Firebase API key
#      VITE_FIREBASE_AUTH_DOMAIN        — Firebase auth domain
#      VITE_FIREBASE_PROJECT_ID         — Firebase project ID
#      VITE_FIREBASE_STORAGE_BUCKET     — Firebase storage bucket
#      VITE_FIREBASE_MESSAGING_SENDER_ID — Firebase messaging sender ID
#      VITE_FIREBASE_APP_ID             — Firebase app ID
#      VITE_FIREBASE_MEASUREMENT_ID     — Firebase measurement ID
# 3. Push to main — the Action will auto-deploy
# ============================================================

name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    # Only run when backend files change (or manual trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(toJson(github.event.commits), 'backend/'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Backend preflight checks
        run: |
          python -m pytest backend/tests/test_api.py -q
          python -m mypy --config-file mypy.ini backend/main.py backend/analytics.py

      - name: Push backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git for HF push
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone the HF Space repo (or create it)
          SPACE_REPO="https://Deign86:${HF_TOKEN}@huggingface.co/spaces/Deign86/mathpulse-api"
          
          git clone "${SPACE_REPO}" hf-space 2>/dev/null || {
            echo "Space repo not found — creating fresh push"
            mkdir hf-space && cd hf-space && git init
            git remote add origin "${SPACE_REPO}"
            cd ..
          }
          
          # Sync backend files into the Space repo
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            backend/ hf-space/
          
          # Commit and push
          cd hf-space
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "🚀 Auto-deploy backend from GitHub (${GITHUB_SHA::7})"
          git push origin main --force
          echo "✅ Deployed to https://huggingface.co/spaces/Deign86/mathpulse-api"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: https://deign86-mathpulse-api.hf.space
        run: npm run build

      - name: Push frontend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          SPACE_REPO="https://Deign86:${HF_TOKEN}@huggingface.co/spaces/Deign86/mathpulse-ai"
          
          git clone "${SPACE_REPO}" hf-frontend 2>/dev/null || {
            echo "Space repo not found — creating fresh push"
            mkdir hf-frontend && cd hf-frontend && git init
            git remote add origin "${SPACE_REPO}"
            cd ..
          }
          
          # Sync build output into the Space repo (keep .git and README)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='README.md' \
            --exclude='.gitattributes' \
            build/ hf-frontend/

          # Ensure HF Space metadata README exists
          printf '%s\n' \
            '---' \
            'title: MathPulse AI' \
            'emoji: "📐"' \
            'colorFrom: blue' \
            'colorTo: purple' \
            'sdk: static' \
            'pinned: false' \
            '---' > hf-frontend/README.md

          # Guardrail: fail fast if required Space metadata is missing/empty
          test -s hf-frontend/README.md
          grep -q '^---$' hf-frontend/README.md
          grep -q '^title: MathPulse AI$' hf-frontend/README.md
          grep -q '^emoji: "📐"$' hf-frontend/README.md
          grep -q '^colorFrom: blue$' hf-frontend/README.md
          grep -q '^colorTo: purple$' hf-frontend/README.md
          grep -q '^sdk: static$' hf-frontend/README.md
          grep -q '^pinned: false$' hf-frontend/README.md
          echo "README.md Space metadata validation passed"
          
          # Commit and push
          cd hf-frontend
          # Store large media as LFS pointers so HF accepts static Space pushes.
          git lfs install --local
          git lfs track "*.mp4" "*.webm" "*.mov"
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "🚀 Auto-deploy frontend from GitHub (${GITHUB_SHA::7})"
          git push origin main --force
          echo "✅ Deployed to https://huggingface.co/spaces/Deign86/mathpulse-ai"
