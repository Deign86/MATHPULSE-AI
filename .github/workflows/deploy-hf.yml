# ============================================================
# Auto-deploy to Hugging Face Spaces on push to main
# - Backend (Docker): Deign86/mathpulse-api-v3test
# - Frontend (Static Full App): Deign86/mathpulse-ai
# ============================================================
# 
# SETUP (one-time):
# 1. Go to https://huggingface.co/settings/tokens
#    Create a token with "Write" access
# 2. In your GitHub repo, go to Settings → Secrets → Actions
#    Add these secrets:
#      HF_TOKEN                         — HuggingFace write token
#      VITE_FIREBASE_API_KEY            — Firebase API key
#      VITE_FIREBASE_AUTH_DOMAIN        — Firebase auth domain
#      VITE_FIREBASE_PROJECT_ID         — Firebase project ID
#      VITE_FIREBASE_STORAGE_BUCKET     — Firebase storage bucket
#      VITE_FIREBASE_MESSAGING_SENDER_ID — Firebase messaging sender ID
#      VITE_FIREBASE_APP_ID             — Firebase app ID
#      VITE_FIREBASE_MEASUREMENT_ID     — Firebase measurement ID
# 3. Push to main — the Action will auto-deploy
# ============================================================

name: Deploy to Hugging Face Spaces

concurrency:
  group: hf-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3.0.3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'deploy-hf.py'
              - 'scripts/enforce_hf_space_chat_env.py'
              - '.github/workflows/deploy-hf.yml'
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - '.github/workflows/deploy-hf.yml'

  deploy-backend:
    needs: detect-changes
    runs-on: ubuntu-latest
    # Run when backend-related files changed, or on manual trigger.
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.backend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Backend preflight checks
        env:
          PYTHONPATH: backend
        run: |
          python -m pytest backend/tests/ -v --tb=short -k "not (test_imported_class_overview_returns_inferred_state or test_inference_metrics_requires_admin or test_recent_course_materials_respects_class_section_filter or test_recent_course_materials_reports_retention_exclusions or test_contains_thinking_hint or test_chunk_count_included or test_sequential_for_235b)"
          python -m mypy --config-file mypy.ini backend/main.py

      - name: Pre-deployment validation
        run: |
          python backend/pre_deploy_check.py
          if [ $? -ne 0 ]; then
            echo "❌ Pre-deployment validation failed - blocking deployment"
            exit 1
          fi

      - name: Push backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git for HF push
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone the HF Space repo (or create it)
          SPACE_REPO="https://Deign86:${HF_TOKEN}@huggingface.co/spaces/Deign86/mathpulse-api-v3test"
          
          git clone "${SPACE_REPO}" hf-space 2>/dev/null || {
            echo "Space repo not found — creating fresh push"
            mkdir hf-space && cd hf-space && git init
            git remote add origin "${SPACE_REPO}"
            cd ..
          }
          
          # Sync backend files into the Space repo
          rsync -av --delete --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' backend/ hf-space/

          # Sync the backend Dockerfile to the Space root (HF Spaces use Dockerfile at repo root)
          cp backend/Dockerfile hf-space/Dockerfile

          # Ensure backend Space metadata README exists with LF-only frontmatter.
          # This avoids malformed Space metadata states on the Hub API.
          printf '%s\n' \
            '---' \
            'title: MathPulse AI API' \
            'emoji: "🧮"' \
            'colorFrom: blue' \
            'colorTo: indigo' \
            'sdk: docker' \
            'app_port: 7860' \
            'pinned: false' \
            '---' \
            '' \
            '# MathPulse AI Backend' \
            '' \
            'FastAPI backend for the MathPulse AI educational platform.' > hf-space/README.md

          # Guardrail: fail fast if required backend metadata is missing/empty.
          test -s hf-space/README.md
          grep -q '^---$' hf-space/README.md
          grep -q '^title: MathPulse AI API$' hf-space/README.md
          grep -q '^emoji: "🧮"$' hf-space/README.md
          grep -q '^colorFrom: blue$' hf-space/README.md
          grep -q '^colorTo: indigo$' hf-space/README.md
          grep -q '^sdk: docker$' hf-space/README.md
          grep -q '^app_port: 7860$' hf-space/README.md
          grep -q '^pinned: false$' hf-space/README.md
          echo "Backend README.md Space metadata validation passed"
          
          # Commit and push
          cd hf-space
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "🚀 Auto-deploy backend from GitHub (${GITHUB_SHA::7})"
          git push origin main --force
          echo "✅ Deployed to https://huggingface.co/spaces/Deign86/mathpulse-api-v3test"

      - name: Enforce backend Space model environment variables
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/enforce_hf_space_chat_env.py \
            --space-id Deign86/mathpulse-api-v3test \
            --chat-model Qwen/Qwen3-32B \
            --provider hf_inference \
            --chat-strict-model-only true \
            --chat-hard-trigger-enabled false \
            --enforce-qwen-only true \
            --qwen-lock-model Qwen/Qwen3-32B \
            --clear-global-model \
            --clear-temp-chat-model

  deploy-frontend:
    needs: detect-changes
    runs-on: ubuntu-latest
    # Run when frontend-related files changed, or on manual trigger.
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.1
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: https://deign86-mathpulse-api-v3test.hf.space
        run: npm run build

      - name: Push frontend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          test -n "${HF_TOKEN}"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          SPACE_REPO="https://Deign86:${HF_TOKEN}@huggingface.co/spaces/Deign86/mathpulse-ai"
          
          git clone "${SPACE_REPO}" hf-frontend 2>/dev/null || {
            echo "Space repo not found — creating fresh push"
            mkdir hf-frontend && cd hf-frontend && git init
            git remote add origin "${SPACE_REPO}"
            cd ..
          }
          
          # Sync static build output into Space repo.
          rsync -av --delete \
            --exclude='.git' \
            --exclude='README.md' \
            --exclude='.gitattributes' \
            build/ hf-frontend/

          # Ensure HF Space metadata README exists
          printf '%s\n' \
            '---' \
            'title: MathPulse AI' \
            'emoji: "📐"' \
            'colorFrom: blue' \
            'colorTo: purple' \
            'sdk: static' \
            'pinned: false' \
            '---' > hf-frontend/README.md

          # Guardrail: fail fast if required Space metadata is missing/empty
          test -s hf-frontend/README.md
          grep -q '^---$' hf-frontend/README.md
          grep -q '^title: MathPulse AI$' hf-frontend/README.md
          grep -q '^emoji: "📐"$' hf-frontend/README.md
          grep -q '^colorFrom: blue$' hf-frontend/README.md
          grep -q '^colorTo: purple$' hf-frontend/README.md
          grep -q '^sdk: static$' hf-frontend/README.md
          grep -q '^pinned: false$' hf-frontend/README.md
          echo "README.md Space metadata validation passed"
          
          # Commit and push
          cd hf-frontend
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          # Store large media as LFS pointers so HF accepts static Space pushes.
          git lfs install --local
          git lfs track "*.mp4" "*.webm" "*.mov"
          git commit -m "🚀 Auto-deploy frontend from GitHub (${GITHUB_SHA::7})"
          git push origin main --force
          echo "✅ Deployed to https://huggingface.co/spaces/Deign86/mathpulse-ai"

